# Fly.io production deploy. See guide/FLY_DEPLOYMENT.md
app = 'vans-coding-router'
primary_region = 'sin'

[build]

[env]
  VCR_CONFIG = '/app/config/router.prod.yaml'
  PUBLIC_URL = 'https://ai.vanscoding.com'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '45s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
