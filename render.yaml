services:
  - type: web
    name: vans-coding-router
    runtime: python
    plan: starter
    branch: master
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn app:app --host 0.0.0.0 --port $PORT --ws-ping-interval 20 --ws-ping-timeout 20
    healthCheckPath: /health
    envVars:
      - key: VCR_CONFIG
        value: /etc/secrets/router.yaml
      - key: PUBLIC_URL
        value: https://ai.vanscoding.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OLLAMA_CLOUD_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vans-coding-router-db
          property: connectionString

  - type: web
    name: vans-coding-router-stg
    runtime: python
    plan: free
    branch: stg
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn app:app --host 0.0.0.0 --port $PORT --ws-ping-interval 20 --ws-ping-timeout 20
    healthCheckPath: /health
    envVars:
      - key: VCR_CONFIG
        value: /etc/secrets/router.yaml
      - key: PUBLIC_URL
        value: https://vans-coding-router-stg.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OLLAMA_CLOUD_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: vans-coding-router-db
    plan: basic-256mb
